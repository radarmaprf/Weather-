<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Радар погоды России — Риск торнадо и штормов</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <i class="fas fa-cloud-sun-rain"></i>
                <h1>Радар ⚡</h1>
            </div>
            <div class="header-controls">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Город..." />
                    <button id="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <button id="favorites-toggle" class="fav-btn" aria-label="Избранное">
                    <i class="fas fa-star"></i>
                </button>
            </div>
            <div class="header-info" id="selected-city">Выберите город</div>
        </header>

        <div id="map"></div>

        <div id="info-panel" class="hidden">
            <div class="panel-header">
                <div class="close-btn" id="close-panel"><i class="fas fa-times"></i></div>
                <h2 id="city-name">Город</h2>
                <button id="favorite-btn" class="fav-btn small"><i class="fas fa-star"></i></button>
            </div>
            <div class="weather-main">
                <div class="weather-icon" id="weather-icon">☀️</div>
                <div class="weather-temp" id="temp">--°C</div>
            </div>
            <div class="weather-details">
                <div class="detail"><i class="fas fa-wind"></i> <span id="wind">-- м/с</span></div>
                <div class="detail"><i class="fas fa-gust"></i> <span id="gust">-- м/с</span></div>
                <div class="detail"><i class="fas fa-tint"></i> <span id="precip">-- мм</span></div>
                <div class="detail"><i class="fas fa-cloud"></i> <span id="condition">--</span></div>
            </div>
            <div class="risk-meter">
                <span>Риск опасных явлений</span>
                <div class="progress-bar">
                    <div id="risk-fill" style="width: 0%;"></div>
                </div>
                <span id="risk-percent">0%</span>
            </div>
            <div id="risk-label">Безопасно</div>

            <!-- Прогноз по часам (ветер + температура) -->
            <div id="hourly-forecast" style="display:none; margin-top:10px;">
                <h4>Прогноз на сегодня <span style="font-weight:normal; font-size:0.7rem; color:#aab;">(ветер и погода)</span></h4>
                <div id="hourly-scroll"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
    <script src="script.js"></script>
</body>
</html>
